<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Dispatch // Adam</title>
  <base href="/" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --base:    #0F0E0C;
      --surf:    #161412;
      --surf2:   #1D1B18;
      --bord:    #2C2926;
      --text:    #E5E1D8;
      --muted:   #6A6560;
      --amber:   #E09A30;
      --amber-d: #A06810;
      --red:     #B03A2E;
      --green:   #3D7A52;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--base);
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-code    { font-family: 'JetBrains Mono', 'Fira Code', monospace; }

    /* Card */
    .card {
      background: var(--surf);
      border: 1px solid var(--bord);
    }
    .card-accent { border-top: 2px solid var(--amber-d); }

    /* Card header */
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--bord);
      gap: 8px;
    }

    /* Label */
    .lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Color utilities */
    .c-amber { color: var(--amber);  }
    .c-muted { color: var(--muted);  }
    .c-red   { color: var(--red);    }
    .c-green { color: var(--green);  }
    .c-text  { color: var(--text);   }

    /* Tag pills */
    .tag {
      background: var(--surf2);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 6px;
      display: inline-block;
    }

    /* Reveal button */
    .btn-reveal {
      background: transparent;
      border: 1px solid var(--bord);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 7px 18px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-transform: uppercase;
    }
    .btn-reveal:hover {
      border-color: var(--amber-d);
      color: var(--amber);
    }

    /* Nav */
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      text-decoration: none;
      transition: background 0.15s;
      border-left: 2px solid transparent;
    }
    .nav-link:hover { background: rgba(255,255,255,0.025); }
    .nav-link.active {
      background: rgba(160,104,16,0.1);
      border-left-color: var(--amber-d);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 2px; height: 2px; }
    ::-webkit-scrollbar-track { background: var(--base); }
    ::-webkit-scrollbar-thumb { background: var(--bord); }

    /* Material icons */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
    }

    /* Animations */
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes rise  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .anim-spin  { animation: spin  0.9s linear infinite; }
    .anim-blink { animation: blink 1.1s ease-in-out infinite; }

    /* Staggered card entrance */
    .card { animation: rise 0.4s ease-out both; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }
    .card:nth-child(7) { animation-delay: 0.35s; }
    .card:nth-child(8) { animation-delay: 0.40s; }
    .card:nth-child(9) { animation-delay: 0.45s; }

    /* Story link hover */
    .story-link { color: var(--text); text-decoration: none; transition: color 0.15s; }
    .story-link:hover { color: var(--amber); }

    /* Row separator in lists */
    .row-sep { border-bottom: 1px solid var(--bord); }
    .row-sep:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
      <div style="display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#6A6560;">
        <span class="material-symbols-outlined anim-spin" style="font-size:14px;">sync</span>
        Initializing
      </div>
    </div>
  </div>
  <div id="blazor-error-ui" style="display:none;position:fixed;bottom:16px;right:16px;padding:10px 16px;background:#161412;border:1px solid #B03A2E;color:#B03A2E;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;">
    Error — <a href="" style="text-decoration:underline;">reload</a>
  </div>
  <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
